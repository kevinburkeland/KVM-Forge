#cloud-config
users:
  - name: PLACEHOLDER_USER
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - SSH_KEY_PLACEHOLDER
hostname: blank
create_hostname_file: true
fqdn: blank.beltec.us
prefer_fqdn_over_hostname: true
timezone: PLACEHOLDER_TIMEZONE
package_update: true
package_upgrade: true
packages:
  - htop
  - ncdu
  - qemu-guest-agent
  - python3-dev
  - python3-pip
runcmd:
  - sudo systemctl enable --now qemu-guest-agent
